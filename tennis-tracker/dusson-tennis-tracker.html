<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useMemo } = React;
const { LineChart, Line, XAxis, YAxis, Tooltip, CartesianGrid, ResponsiveContainer } = Recharts;

// ─── DB (localStorage) ────────────────────────────────────────────────
const DB = {
  get: (k, def) => { try { return JSON.parse(localStorage.getItem('dtt_' + k)) ?? def; } catch { return def; } },
  set: (k, v) => localStorage.setItem('dtt_' + k, JSON.stringify(v)),
};

function initDB() {
  if (!DB.get('players', null)) {
    DB.set('players', [
      { id: 1, name: 'Santiago Dussán', category: 'Sub-18', birthdate: '2007-01-01', nationality: 'Colombian', active: true },
      { id: 2, name: 'Nicole Dussán',   category: 'Sub-12', birthdate: '2013-01-01', nationality: 'Colombian', active: true },
    ]);
    DB.set('tournaments', []);
    DB.set('matches', []);
    DB.set('nextId', { players: 3, tournaments: 1, matches: 1 });
  }
}

function nextId(table) {
  const ids = DB.get('nextId', { players: 3, tournaments: 1, matches: 1 });
  const id = ids[table];
  ids[table] = id + 1;
  DB.set('nextId', ids);
  return id;
}

// ─── Helpers ──────────────────────────────────────────────────────────
const SURFACES = ['Clay','Hard','Grass','Synthetic','Variable'];
const COUNTRIES = ['Colombia','USA','Other'];
const ROUNDS = ['1R','2R','3R','QF','SF','F'];
const LEVELS = ['ITF G1','ITF G2','ITF G3','ITF G4','ITF G5','National','Regional','Club'];
const surfaceIcon = { Clay:'🟤', Hard:'🔵', Grass:'🟢', Synthetic:'⚪', Variable:'🎾' };
const countryFlag = { Colombia:'🇨🇴', USA:'🇺🇸', Other:'🌍' };
const SCORE_REGEX = /^(\d{1,2}-\d{1,2})(, \d{1,2}-\d{1,2})*$/;

function fmt(d) {
  if (!d) return '-';
  const [y,m,day] = d.split('-');
  return `${day}/${m}/${y}`;
}

function badge(r) {
  if (r === 'W')  return { bg: '#EAF3DE', color: '#3B6D11', label: 'W' };
  if (r === 'L')  return { bg: '#FCEBEB', color: '#A32D2D', label: 'L' };
  if (r === 'WO') return { bg: '#EAF3DE', color: '#3B6D11', label: 'WO' };
  return { bg: '#FAEEDA', color: '#633806', label: 'P' };
}

function computeStats(matches) {
  const wins = matches.filter(m => m.result === 'W').length;
  const losses = matches.filter(m => m.result === 'L').length;
  const total = matches.length;
  const winRate = total > 0 ? Math.round(wins / total * 100) : 0;

  let streak = 0, streakType = null;
  const sorted = [...matches].sort((a,b) => b.date.localeCompare(a.date));
  for (const m of sorted) {
    if (m.result !== 'W' && m.result !== 'L') continue;
    if (!streakType) { streakType = m.result; streak = 1; }
    else if (m.result === streakType) streak++;
    else break;
  }

  let longest = 0, cur = 0;
  for (const m of [...sorted].reverse()) {
    if (m.result === 'W') { cur++; longest = Math.max(longest, cur); } else cur = 0;
  }

  const tIds = new Set(matches.map(m => m.tournamentId).filter(Boolean));
  const countries = new Set(matches.map(m => m.country).filter(Boolean));

  const surf = {};
  for (const m of matches) {
    const s = m.surface || 'Unknown';
    if (!surf[s]) surf[s] = { matches: 0, wins: 0 };
    surf[s].matches++;
    if (m.result === 'W') surf[s].wins++;
  }
  const statsBySurface = Object.entries(surf).map(([s, d]) => ({
    surface: s, matches: d.matches, wins: d.wins,
    winRate: Math.round(d.wins / d.matches * 100),
  }));

  const now = new Date();
  const monthly = {};
  for (let i = 11; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    monthly[key] = { wins: 0, total: 0 };
  }
  for (const m of matches) {
    const key = m.date.substring(0,7);
    if (monthly[key]) { monthly[key].total++; if (m.result==='W') monthly[key].wins++; }
  }
  const monthlyChart = Object.entries(monthly).map(([month, d]) => ({
    month, winRate: d.total > 0 ? Math.round(d.wins/d.total*100) : null, matches: d.total,
  }));

  return { total, wins, losses, winRate, streak, streakType, longest,
    tournamentsPlayed: tIds.size, countries: countries.size, statsBySurface, monthlyChart };
}

// ─── Match Row ────────────────────────────────────────────────────────
function MatchRow({ match, showPlayer, onDelete }) {
  const b = badge(match.result);
  const tName = (DB.get('tournaments',[]).find(t => t.id === match.tournamentId) || {}).name;
  const pName = showPlayer ? (DB.get('players',[]).find(p => p.id === match.playerId) || {}).name?.split(' ')[0] : null;
  return (
    <div style={{display:'flex',alignItems:'center',gap:10,padding:'10px 0',borderBottom:'1px solid #f3f4f6'}}>
      <span style={{background:b.bg,color:b.color,fontWeight:700,fontSize:11,padding:'3px 7px',borderRadius:6,minWidth:28,textAlign:'center'}}>{b.label}</span>
      <div style={{flex:1,minWidth:0}}>
        <div style={{display:'flex',alignItems:'center',gap:6,fontSize:14,fontWeight:500}}>
          {pName && <span style={{fontSize:11,color:match.playerId===1?'#3266ad':'#D4537E',fontWeight:700}}>{pName}</span>}
          <span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{match.opponentName}</span>
        </div>
        <div style={{display:'flex',gap:8,fontSize:11,color:'#6b7280',marginTop:2}}>
          {match.score && <span style={{fontFamily:'monospace'}}>{match.score}</span>}
          {match.round && <span style={{background:'#f3f4f6',padding:'1px 5px',borderRadius:4}}>{match.round}</span>}
          {match.surface && <span>{surfaceIcon[match.surface]||''}</span>}
          {match.country && <span>{countryFlag[match.country]||match.country}</span>}
        </div>
      </div>
      <div style={{textAlign:'right',flexShrink:0}}>
        <div style={{fontSize:11,color:'#9ca3af'}}>{fmt(match.date)}</div>
        {tName && <div style={{fontSize:10,color:'#d1d5db',maxWidth:70,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{tName}</div>}
      </div>
      {onDelete && (
        <button onClick={() => onDelete(match.id)} style={{color:'#d1d5db',background:'none',border:'none',cursor:'pointer',fontSize:16,padding:'0 4px'}} title="Delete">×</button>
      )}
    </div>
  );
}

// ─── Match Modal ──────────────────────────────────────────────────────
function MatchModal({ onClose, onSaved, defaultPlayerId }) {
  const [form, setForm] = useState({
    playerId: defaultPlayerId ? String(defaultPlayerId) : '',
    result: 'W', tournamentId: '', tournamentSearch: '',
    city: '', country: 'Colombia', surface: 'Clay',
    opponentName: '', opponentNationality: '', score: '',
    round: '1R', date: new Date().toISOString().split('T')[0],
    notes: '', duration: '',
  });
  const [errors, setErrors] = useState({});
  const [saving, setSaving] = useState(false);
  const [showSug, setShowSug] = useState(false);
  const tournaments = DB.get('tournaments', []);
  const suggestions = tournaments.filter(t => t.name.toLowerCase().includes(form.tournamentSearch.toLowerCase())).slice(0,5);

  function set(k, v) { setForm(f => ({...f, [k]: v})); setErrors(e => ({...e, [k]: ''})); }

  function validate() {
    const e = {};
    if (!form.playerId) e.playerId = 'Required';
    if (!form.opponentName.trim()) e.opponentName = 'Required';
    if (!form.date) e.date = 'Required';
    if (form.score && !SCORE_REGEX.test(form.score.trim())) e.score = 'Format: "6-3" or "6-3, 4-6, 7-5"';
    return e;
  }

  function handleSubmit(e) {
    e.preventDefault();
    const errs = validate();
    if (Object.keys(errs).length) { setErrors(errs); return; }
    setSaving(true);

    let tournamentId = form.tournamentId ? Number(form.tournamentId) : undefined;
    if (!tournamentId && form.tournamentSearch.trim()) {
      const ts = DB.get('tournaments', []);
      const nt = { id: nextId('tournaments'), name: form.tournamentSearch.trim(), city: form.city || 'Unknown',
        country: form.country, startDate: form.date, endDate: form.date, surface: form.surface,
        players: form.playerId === '1' ? 'Santiago' : 'Nicole', level: 'Club' };
      DB.set('tournaments', [...ts, nt]);
      tournamentId = nt.id;
    }

    const matches = DB.get('matches', []);
    const nm = {
      id: nextId('matches'), playerId: Number(form.playerId), tournamentId: tournamentId || undefined,
      date: form.date, result: form.result, opponentName: form.opponentName.trim(),
      opponentNationality: form.opponentNationality || undefined, score: form.score.trim() || undefined,
      round: form.round, surface: form.surface, city: form.city || undefined, country: form.country,
      notes: form.notes || undefined, duration: form.duration ? Number(form.duration) : undefined,
    };
    DB.set('matches', [...matches, nm]);
    setSaving(false);
    onSaved();
    onClose();
  }

  const inp = (label, key, type='text', opts={}) => (
    <div>
      <label style={{fontSize:11,fontWeight:600,color:'#6b7280',display:'block',marginBottom:4}}>{label}</label>
      <input type={type} value={form[key]} onChange={e => set(key, e.target.value)} {...opts} />
      {errors[key] && <p style={{color:'#ef4444',fontSize:11,marginTop:2}}>{errors[key]}</p>}
    </div>
  );

  const sel = (label, key, options) => (
    <div>
      <label style={{fontSize:11,fontWeight:600,color:'#6b7280',display:'block',marginBottom:4}}>{label}</label>
      <select value={form[key]} onChange={e => set(key, e.target.value)}>
        {options.map(o => <option key={o.v||o} value={o.v||o}>{o.l||o}</option>)}
      </select>
    </div>
  );

  return (
    <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.4)',zIndex:50,display:'flex',alignItems:'flex-end',justifyContent:'center'}}>
      <div onClick={e=>e.stopPropagation()} style={{background:'#fff',width:'100%',maxWidth:520,borderRadius:'20px 20px 0 0',maxHeight:'90vh',overflowY:'auto'}}>
        <div style={{padding:'16px 16px 12px',borderBottom:'1px solid #e5e7eb',display:'flex',justifyContent:'space-between',alignItems:'center',position:'sticky',top:0,background:'#fff'}}>
          <span style={{fontWeight:600,fontSize:15}}>Add match</span>
          <button onClick={onClose} style={{background:'none',border:'none',fontSize:22,cursor:'pointer',color:'#9ca3af'}}>×</button>
        </div>
        <form onSubmit={handleSubmit} style={{padding:16,display:'flex',flexDirection:'column',gap:12}}>
          {sel('Player','playerId',[{v:'',l:'Select player'},{v:'1',l:'Santiago Dussán (Sub-18)'},{v:'2',l:'Nicole Dussán (Sub-12)'}])}
          {errors.playerId && <p style={{color:'#ef4444',fontSize:11,marginTop:-8}}>{errors.playerId}</p>}

          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            {inp('Date','date','date')}
            {sel('Result','result',[{v:'W',l:'W – Win'},{v:'L',l:'L – Loss'},{v:'WO',l:'WO – Walkover'},{v:'P',l:'P – Pending'}])}
          </div>

          <div style={{position:'relative'}}>
            <label style={{fontSize:11,fontWeight:600,color:'#6b7280',display:'block',marginBottom:4}}>Tournament (optional)</label>
            <input placeholder="Search or create..." value={form.tournamentSearch}
              onChange={e => { set('tournamentSearch', e.target.value); set('tournamentId',''); setShowSug(true); }}
              onFocus={() => setShowSug(true)} onBlur={() => setTimeout(() => setShowSug(false), 150)} />
            {showSug && suggestions.length > 0 && (
              <div style={{position:'absolute',zIndex:10,width:'100%',background:'#fff',border:'1px solid #e5e7eb',borderRadius:8,marginTop:2,maxHeight:140,overflowY:'auto'}}>
                {suggestions.map(t => (
                  <button type="button" key={t.id} onClick={() => { set('tournamentSearch',t.name); set('tournamentId',String(t.id)); set('city',t.city); set('country',t.country); set('surface',t.surface); setShowSug(false); }}
                    style={{width:'100%',textAlign:'left',padding:'8px 12px',fontSize:13,background:'none',border:'none',cursor:'pointer',borderBottom:'1px solid #f3f4f6'}}>
                    {t.name} — {t.city}, {t.country}
                  </button>
                ))}
              </div>
            )}
          </div>

          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            {sel('Round','round', ROUNDS)}
            {sel('Surface','surface', SURFACES)}
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            {inp('City','city','text',{placeholder:'Bogotá'})}
            {sel('Country','country', COUNTRIES)}
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            {inp('Opponent name','opponentName','text',{placeholder:'J. Pérez'})}
            {inp('Opponent nationality','opponentNationality','text',{placeholder:'Colombian'})}
          </div>
          {inp('Score','score','text',{placeholder:'6-3, 4-6, 7-5'})}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            {inp('Duration (min)','duration','number',{placeholder:'90'})}
          </div>
          <div>
            <label style={{fontSize:11,fontWeight:600,color:'#6b7280',display:'block',marginBottom:4}}>Notes</label>
            <textarea rows={2} value={form.notes} onChange={e => set('notes',e.target.value)} placeholder="Optional..." style={{resize:'none'}} />
          </div>
          <button type="submit" disabled={saving} style={{background:'#3266ad',color:'#fff',border:'none',borderRadius:12,padding:'12px',fontSize:14,fontWeight:600,cursor:'pointer',opacity:saving?0.6:1}}>
            {saving ? 'Saving...' : 'Save match'}
          </button>
        </form>
      </div>
    </div>
  );
}

// ─── Dashboard ────────────────────────────────────────────────────────
function Dashboard({ nav, refresh }) {
  const [showModal, setShowModal] = useState(false);
  const players = DB.get('players', []);
  const allMatches = DB.get('matches', []);
  const recent = [...allMatches].sort((a,b) => b.date.localeCompare(a.date)).slice(0,8);

  function deleteMatch(id) {
    DB.set('matches', DB.get('matches',[]).filter(m => m.id !== id));
    refresh();
  }

  return (
    <div style={{maxWidth:640,margin:'0 auto'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <h1 style={{fontWeight:700,fontSize:20}}>Dashboard</h1>
        <button onClick={() => setShowModal(true)} style={{background:'#3266ad',color:'#fff',border:'none',borderRadius:12,padding:'8px 16px',fontSize:13,fontWeight:600,cursor:'pointer'}}>+ Add match</button>
      </div>

      <div style={{display:'flex',gap:12,marginBottom:20}}>
        {players.map(p => {
          const pm = allMatches.filter(m => m.playerId === p.id);
          const s = computeStats(pm);
          const isS = p.id === 1;
          const c = isS ? '#3266ad' : '#D4537E';
          const bg = isS ? '#E6F1FB' : '#FBEAF0';
          return (
            <div key={p.id} onClick={() => nav('player', p.id)} style={{flex:1,border:`2px solid ${c}`,background:bg,borderRadius:16,padding:16,cursor:'pointer'}}>
              <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
                <div style={{width:44,height:44,borderRadius:'50%',background:c,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,fontWeight:700}}>{p.name[0]}</div>
                <div>
                  <div style={{fontWeight:700,fontSize:13,color:c}}>{p.name}</div>
                  <div style={{fontSize:11,color:'#6b7280'}}>{p.category} · 🇨🇴</div>
                </div>
                {s.streak > 0 && (
                  <div style={{marginLeft:'auto',fontSize:11,fontWeight:700,padding:'3px 8px',borderRadius:99,background:s.streakType==='W'?'#EAF3DE':'#FCEBEB',color:s.streakType==='W'?'#3B6D11':'#A32D2D'}}>
                    🔥 {s.streak}{s.streakType}
                  </div>
                )}
              </div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',textAlign:'center',gap:4}}>
                {[{l:'Matches',v:s.total},{l:'Wins',v:s.wins,c:'#3B6D11'},{l:'Win %',v:`${s.winRate}%`,c}].map(st => (
                  <div key={st.l}>
                    <div style={{fontWeight:700,fontSize:18,color:st.c||'inherit'}}>{st.v}</div>
                    <div style={{fontSize:10,color:'#9ca3af'}}>{st.l}</div>
                  </div>
                ))}
              </div>
            </div>
          );
        })}
      </div>

      <div style={{background:'#fff',border:'1px solid #e5e7eb',borderRadius:16,padding:16}}>
        <div style={{fontWeight:600,fontSize:13,color:'#374151',marginBottom:10}}>Recent matches</div>
        {recent.length === 0
          ? <div style={{textAlign:'center',color:'#9ca3af',padding:'20px 0',fontSize:13}}>No matches yet. Add your first match!</div>
          : recent.map(m => <MatchRow key={m.id} match={m} showPlayer onDelete={deleteMatch} />)}
      </div>

      {showModal && <MatchModal onClose={() => setShowModal(false)} onSaved={refresh} />}
    </div>
  );
}

// ─── Player Profile ───────────────────────────────────────────────────
function PlayerProfile({ playerId, refresh }) {
  const [showModal, setShowModal] = useState(false);
  const [fTournament, setFT] = useState('');
  const [fSurface, setFS] = useState('');
  const [fResult, setFR] = useState('');
  const [fFrom, setFF] = useState('');

  const player = DB.get('players',[]).find(p => p.id === playerId);
  const allMatches = DB.get('matches',[]).filter(m => m.playerId === playerId);
  const tournaments = DB.get('tournaments',[]);
  const isS = playerId === 1;
  const c = isS ? '#3266ad' : '#D4537E';
  const bg = isS ? '#E6F1FB' : '#FBEAF0';

  const s = computeStats(allMatches);

  const filtered = allMatches
    .filter(m => !fTournament || m.tournamentId === Number(fTournament))
    .filter(m => !fSurface || m.surface === fSurface)
    .filter(m => !fResult || m.result === fResult)
    .filter(m => !fFrom || m.date >= fFrom)
    .sort((a,b) => b.date.localeCompare(a.date));

  const h2h = {};
  for (const m of allMatches) {
    if (!h2h[m.opponentName]) h2h[m.opponentName] = { w:0, l:0 };
    if (m.result==='W') h2h[m.opponentName].w++;
    if (m.result==='L') h2h[m.opponentName].l++;
  }
  const h2hList = Object.entries(h2h).sort((a,b)=>(b[1].w+b[1].l)-(a[1].w+a[1].l)).slice(0,8);

  function deleteMatch(id) {
    DB.set('matches', DB.get('matches',[]).filter(m => m.id !== id));
    refresh();
  }

  if (!player) return null;

  return (
    <div style={{maxWidth:640,margin:'0 auto'}}>
      <div style={{display:'flex',alignItems:'center',gap:14,padding:16,border:`2px solid ${c}`,background:bg,borderRadius:16,marginBottom:16}}>
        <div style={{width:56,height:56,borderRadius:'50%',background:c,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:26,fontWeight:700}}>{player.name[0]}</div>
        <div>
          <h1 style={{fontWeight:700,fontSize:20,color:c,margin:0}}>{player.name}</h1>
          <div style={{fontSize:12,color:'#6b7280'}}>{player.category} · 🇨🇴 Colombian</div>
        </div>
        <button onClick={() => setShowModal(true)} style={{marginLeft:'auto',background:c,color:'#fff',border:'none',borderRadius:12,padding:'8px 14px',fontSize:12,fontWeight:600,cursor:'pointer'}}>+ Add match</button>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:16}}>
        {[{l:'Matches',v:s.total},{l:'Wins',v:s.wins,col:'#3B6D11'},{l:'Losses',v:s.losses,col:'#A32D2D'},{l:'Win %',v:`${s.winRate}%`,col:c},{l:'Tournaments',v:s.tournamentsPlayed},{l:'Countries',v:s.countries}].map(st => (
          <div key={st.l} style={{background:'#fff',border:'1px solid #e5e7eb',borderRadius:12,padding:'10px',textAlign:'center'}}>
            <div style={{fontWeight:700,fontSize:20,color:st.col||'inherit'}}>{st.v}</div>
            <div style={{fontSize:10,color:'#9ca3af'}}>{st.l}</div>
          </div>
        ))}
      </div>

      {s.streak > 0 && (
        <div style={{padding:'10px 14px',borderRadius:12,marginBottom:16,fontWeight:600,fontSize:13,background:s.streakType==='W'?'#EAF3DE':'#FCEBEB',color:s.streakType==='W'?'#3B6D11':'#A32D2D'}}>
          🔥 Current streak: {s.streak} {s.streakType==='W'?'wins':'losses'} in a row · Longest win streak: {s.longest}
        </div>

  const tournaments = DB.get('tournaments',[])
    .filter(t => !fCountry || t.country === fCountry)
    .filter(t => !fSurface || t.surface === fSurface)

    .sort((a,b) => b.startDate.localeCompare(a.startDate));

            <div><label style={{fontSize:11,fontWeight:600,color:'#6b7280',display:'block',marginBottom:3}}>Surface</label><select value={form.surface} onChange={e=>setForm(f=>({...f,surface:e.target.value}))}>{SURFACES.map(s=><option key={s} value={s}>{s}</option>)}</select></div>
            <div><label style={{fontSize:11,fontWeight:600,color:'#6b7280',display:'block',marginBottom:3}}>Players</label><select value={form.players} onChange={e=>setForm(f=>({...f,players:e.target.value}))}><option>Both</option><option>Santiago</option><option>Nicole</option></select></div>

                    <div style={{fontSize:11,color:'#d1d5db'}}>{t.startDate} → {t.endDate}</div>
                  </div>
                  <div style={{textAlign:'right',flexShrink:0}}>
                    <div style={{fontSize:12,fontWeight:600}}><span style={{color:'#3B6D11'}}>{wins}W</span> / <span style={{color:'#A32D2D'}}>{losses}L</span></div>
                    <div style={{fontSize:11,color:'#9ca3af'}}>{t.level}</div>
                    <div style={{color:'#9ca3af',marginTop:4}}>{expanded===t.id?'▲':'▼'}</div>
                  </div>
                </div>
                {tm.length > 0 && (
                  <div style={{marginTop:8,display:'flex',height:4,borderRadius:99,overflow:'hidden',background:'#f3f4f6',gap:1}}>
                    <div style={{background:'#3266ad',width:`${santiagoPct}%`}} />
                    <div style={{background:'#D4537E',flex:1}} />
                  </div>

                <div style={{fontSize:11,color:'#9ca3af',marginTop:4}}>{t.players} · {tm.length} match{tm.length!==1?'es':''}</div>

                  {tm.length === 0
                    ? <div style={{fontSize:12,color:'#9ca3af',padding:'8px 0'}}>No matches recorded</div>
                    : tm.sort((a,b)=>b.date.localeCompare(a.date)).map(m => <MatchRow key={m.id} match={m} showPlayer onDelete={deleteMatch} />)}

              )}
            </div>
          );
        })}
    </div>
  );
}

// ─── Reports ──────────────────────────────────────────────────────────
function Reports() {
  const [playerId, setPlayerId] = useState('');
  const [from, setFrom] = useState('');
  const [to, setTo] = useState('');
  const [country, setCountry] = useState('');

  function exportCSV() {
    const matches = DB.get('matches',[])
      .filter(m => !playerId || m.playerId === Number(playerId))
      .filter(m => !from || m.date >= from)
      .filter(m => !to || m.date <= to)
      .filter(m => !country || m.country === country)
      .sort((a,b) => b.date.localeCompare(a.date));
    const players = DB.get('players',[]);
    const tournaments = DB.get('tournaments',[]);
    const header = ['Date','Player','Tournament','Round','Result','Opponent','Opp. Nationality','Score','Surface','City','Country','Duration','Notes'];
    const rows = matches.map(m => [
      m.date,
      (players.find(p=>p.id===m.playerId)||{}).name||'',
      (tournaments.find(t=>t.id===m.tournamentId)||{}).name||'',
      m.round||'', m.result, m.opponentName,
      m.opponentNationality||'', m.score||'', m.surface||'',
      m.city||'', m.country||'', m.duration||'', m.notes||''
    ].map(v => `"${String(v).replace(/"/g,'""')}"`).join(','));
    const csv = [header.join(','), ...rows].join('\n');
    const blob = new Blob([csv], {type:'text/csv'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'tennis-matches.csv';
    a.click();
  }

  function exportJSON() {
    const data = {
      players: DB.get('players',[]),
      tournaments: DB.get('tournaments',[]),
      matches: DB.get('matches',[]),
    };
    const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `tennis-backup-${new Date().toISOString().split('T')[0]}.json`;
    a.click();
  }

  return (
    <div style={{maxWidth:480,margin:'0 auto'}}>
      <h1 style={{fontWeight:700,fontSize:20,marginBottom:20}}>Reports</h1>
      <div style={{background:'#fff',border:'1px solid #e5e7eb',borderRadius:16,padding:16,display:'flex',flexDirection:'column',gap:14}}>
        <div style={{fontWeight:600,fontSize:13,color:'#374151'}}>Filter before export</div>
        <div>
          <label style={{fontSize:11,fontWeight:600,color:'#6b7280',display:'block',marginBottom:3}}>Player</label>
          <select value={playerId} onChange={e=>setPlayerId(e.target.value)}>
            <option value="">Both players</option>
            <option value="1">Santiago Dussán</option>
            <option value="2">Nicole Dussán</option>
          </select>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          <div><label style={{fontSize:11,fontWeight:600,color:'#6b7280',display:'block',marginBottom:3}}>From</label><input type="date" value={from} onChange={e=>setFrom(e.target.value)} /></div>
          <div><label style={{fontSize:11,fontWeight:600,color:'#6b7280',display:'block',marginBottom:3}}>To</label><input type="date" value={to} onChange={e=>setTo(e.target.value)} /></div>
        </div>
        <div>
          <label style={{fontSize:11,fontWeight:600,color:'#6b7280',display:'block',marginBottom:3}}>Country</label>
          <select value={country} onChange={e=>setCountry(e.target.value)}>
            <option value="">All countries</option>
            <option value="Colombia">Colombia 🇨🇴</option>
            <option value="USA">USA 🇺🇸</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:8,marginTop:4}}>
          <button onClick={exportCSV} style={{background:'#3B6D11',color:'#fff',border:'none',borderRadius:12,padding:12,fontSize:13,fontWeight:600,cursor:'pointer'}}>📊 Export CSV (Excel compatible)</button>
          <button onClick={exportJSON} style={{background:'#1e293b',color:'#fff',border:'none',borderRadius:12,padding:12,fontSize:13,fontWeight:600,cursor:'pointer'}}>💾 Export JSON backup</button>
        </div>
      </div>
      <div style={{marginTop:12,fontSize:11,color:'#9ca3af',textAlign:'center'}}>
        CSV se abre en Excel/Google Sheets con todos los partidos.<br/>
        JSON sirve como respaldo completo de la base de datos.
      </div>
    </div>
  );
}

// ─── Settings ─────────────────────────────────────────────────────────
function Settings({ refresh }) {
  const [players, setPlayers] = useState(DB.get('players',[]));
  const [editing, setEditing] = useState({});
  const [saved, setSaved] = useState('');

  function setField(id, k, v) { setEditing(e => ({...e, [id]: {...e[id], [k]: v}})); }

  function savePlayer(id) {
    const ps = DB.get('players',[]).map(p => p.id === id ? {...p, ...editing[id]} : p);
    DB.set('players', ps);
    setPlayers(ps);
    setSaved('Saved!'); setTimeout(() => setSaved(''), 2000);
    refresh();
  }

  function importJSON(e) {
    const file = e.target.files?.[0]; if (!file) return;
    file.text().then(text => {
      const data = JSON.parse(text);
      if (data.players) DB.set('players', data.players);
      if (data.tournaments) DB.set('tournaments', data.tournaments);
      if (data.matches) DB.set('matches', data.matches);
      setPlayers(DB.get('players',[]));
      setSaved('Data restored!'); setTimeout(() => setSaved(''), 2000);
      refresh();
    });
  }

  function clearAll() {
    if (!confirm('This will delete ALL matches and tournaments. Are you sure?')) return;
    DB.set('matches', []); DB.set('tournaments', []);
    DB.set('nextId', { players: 3, tournaments: 1, matches: 1 });
    setSaved('Data cleared!'); setTimeout(() => setSaved(''), 2000);
    refresh();
  }

  return (
    <div style={{maxWidth:480,margin:'0 auto'}}>
      <h1 style={{fontWeight:700,fontSize:20,marginBottom:20}}>Settings</h1>
      {saved && <div style={{background:'#EAF3DE',color:'#3B6D11',padding:'10px 14px',borderRadius:10,marginBottom:14,fontSize:13,fontWeight:600}}>{saved}</div>}

      <div style={{background:'#fff',border:'1px solid #e5e7eb',borderRadius:16,padding:16,marginBottom:14}}>
        <div style={{fontWeight:600,fontSize:13,color:'#374151',marginBottom:12}}>Player profiles</div>
        {players.map(p => (
          <div key={p.id} style={{marginBottom:16}}>
            <div style={{fontWeight:600,fontSize:13,color:p.id===1?'#3266ad':'#D4537E',marginBottom:8}}>{p.name}</div>
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              <div>
                <label style={{fontSize:11,fontWeight:600,color:'#6b7280',display:'block',marginBottom:3}}>Name</label>
                <input defaultValue={p.name} onChange={e=>setField(p.id,'name',e.target.value)} />
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                <div>
                  <label style={{fontSize:11,fontWeight:600,color:'#6b7280',display:'block',marginBottom:3}}>Category</label>
                  <select defaultValue={p.category} onChange={e=>setField(p.id,'category',e.target.value)}>
                    {['Sub-12','Sub-14','Sub-16','Sub-18'].map(c=><option key={c} value={c}>{c}</option>)}
                  </select>
                </div>
                <div>
                  <label style={{fontSize:11,fontWeight:600,color:'#6b7280',display:'block',marginBottom:3}}>Birthdate</label>
                  <input type="date" defaultValue={p.birthdate||''} onChange={e=>setField(p.id,'birthdate',e.target.value)} />
                </div>
              </div>
              <button onClick={()=>savePlayer(p.id)} style={{background:p.id===1?'#3266ad':'#D4537E',color:'#fff',border:'none',borderRadius:10,padding:9,fontSize:13,fontWeight:600,cursor:'pointer'}}>
                Save {p.name.split(' ')[0]}
              </button>
            </div>
          </div>
        ))}
      </div>

      <div style={{background:'#fff',border:'1px solid #e5e7eb',borderRadius:16,padding:16}}>
        <div style={{fontWeight:600,fontSize:13,color:'#374151',marginBottom:12}}>Data</div>
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          <label style={{border:'1px solid #e5e7eb',borderRadius:10,padding:10,fontSize:13,fontWeight:600,textAlign:'center',cursor:'pointer',display:'block'}}>
            📂 Import JSON backup
            <input type="file" accept=".json" style={{display:'none'}} onChange={importJSON} />
          </label>
          <button onClick={clearAll} style={{background:'#fee2e2',color:'#A32D2D',border:'none',borderRadius:10,padding:10,fontSize:13,fontWeight:600,cursor:'pointer'}}>
            🗑️ Clear all matches & tournaments
          </button>
        </div>
      </div>
    </div>
  );
}

        {page === 'dashboard' && <Dashboard key={tick} nav={nav} refresh={refresh} />}
        {page === 'player' && <PlayerProfile key={tick + '-' + pageParam} playerId={pageParam} refresh={refresh} />}
        {page === 'tournaments' && <Tournaments key={tick} refresh={refresh} />}
        {page === 'reports' && <Reports key={tick} />}
        {page === 'settings' && <Settings key={tick} refresh={refresh} />}
      </main>

      {/* Bottom nav */}
      <nav style={{position:'fixed',bottom:0,left:0,right:0,background:'#fff',borderTop:'1px solid #e5e7eb',display:'flex',zIndex:40}}>
        {tabs.map(t => {
          const active = activePage === t.id;
          const pId = t.id === 'player1' ? 1 : t.id === 'player2' ? 2 : null;
          return (
            <button key={t.id}
              onClick={() => pId ? nav('player', pId) : nav(t.id)}
              style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',padding:'6px 0',background:'none',border:'none',cursor:'pointer',color:active?'#3266ad':'#9ca3af',fontWeight:active?700:400}}>
              <span style={{fontSize:18}}>{t.icon}</span>
              <span style={{fontSize:10,marginTop:1}}>{t.label}</span>
            </button>
          );
        })}
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
